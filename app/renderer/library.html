<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNDBTS — Library</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="library.css" />
</head>
<body>
  <div class="library-app">
    <header class="library-header">
      <div class="library-header-title">
        <h1>Library</h1>
        <p class="library-subtitle">Import, search, and edit sound metadata. Multi-select for batch tags and category.</p>
      </div>
      <div class="library-header-actions">
        <button type="button" class="lib-btn lib-btn-primary" id="btn-browse-import">Browse to import…</button>
      </div>
    </header>

    <section class="drop-zone" id="drop-zone" aria-label="Drop audio files here">
      <div class="drop-zone-inner">
        <span class="drop-zone-icon" aria-hidden="true">⌁</span>
        <p class="drop-zone-text">Drop <strong>.mp3</strong> or <strong>.wav</strong> files here</p>
        <p class="drop-zone-hint">Files are copied into Effects/ and merged into the library (save to persist).</p>
      </div>
    </section>

    <div class="library-toolbar">
      <label class="lib-search-wrap">
        <svg class="lib-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input type="search" id="lib-search" class="lib-search-input" placeholder="Filter by name, category, tags…" autocomplete="off" />
      </label>
      <label class="lib-filter-cat">
        <span class="lib-filter-label">Category</span>
        <select id="lib-filter-category" class="lib-select">
          <option value="">All</option>
        </select>
      </label>
    </div>

    <div class="library-main">
      <div class="library-table-wrap">
        <table class="lib-table" id="lib-table">
          <thead>
            <tr>
              <th class="col-check">
                <input type="checkbox" id="lib-select-all" title="Select all" aria-label="Select all visible" />
              </th>
              <th class="col-name">Name</th>
              <th class="col-cat">Category</th>
              <th class="col-tags">Tags</th>
              <th class="col-dur">Dur</th>
            </tr>
          </thead>
          <tbody id="lib-tbody"></tbody>
        </table>
        <div class="lib-empty" id="lib-empty" hidden>No sounds match this filter.</div>
      </div>

      <aside class="library-panel" id="library-panel">
        <h2 class="panel-title" id="panel-title">No selection</h2>
        <div class="panel-body" id="panel-single" hidden>
          <label class="panel-field">
            <span class="panel-label">Name</span>
            <input type="text" id="panel-name" class="panel-input" />
          </label>
          <label class="panel-field">
            <span class="panel-label">Category</span>
            <input type="text" id="panel-category" class="panel-input" />
          </label>
          <label class="panel-field">
            <span class="panel-label">Tags</span>
            <input type="text" id="panel-tags" class="panel-input" placeholder="comma-separated" />
          </label>
          <button type="button" class="lib-btn lib-btn-save" id="panel-save-single">Save row</button>
        </div>
        <div class="panel-body" id="panel-multi" hidden>
          <p class="panel-multi-count" id="panel-multi-count"></p>
          <label class="panel-field">
            <span class="panel-label">Set category (all selected)</span>
            <input type="text" id="panel-batch-category" class="panel-input" placeholder="Leave empty to skip" />
          </label>
          <label class="panel-field">
            <span class="panel-label">Add tags</span>
            <input type="text" id="panel-batch-add-tags" class="panel-input" placeholder="comma-separated, merged into each" />
          </label>
          <label class="panel-field">
            <span class="panel-label">Remove tag</span>
            <select id="panel-batch-remove-tag" class="lib-select">
              <option value="">— Choose tag —</option>
            </select>
          </label>
          <button type="button" class="lib-btn lib-btn-save" id="panel-apply-batch">Apply to selection</button>
        </div>
      </aside>
    </div>

    <footer class="library-footer">
      <span id="lib-status" class="lib-status"></span>
    </footer>
  </div>

  <script src="../../node_modules/fuse.js/dist/fuse.min.js"></script>
  <script src="browser-sndbts.js"></script>
  <script src="library.js"></script>
</body>
</html>
