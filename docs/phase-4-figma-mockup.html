<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNDBTS — Phase 4 Edit mode</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    :root {
      --surface-card: #1E221B;
      --surface-input: #181B16;
      --surface-footer: rgba(0, 0, 0, 0.15);
      --surface-row-hover: rgba(255, 255, 255, 0.07);
      --surface-row-selected: rgba(212, 130, 26, 0.10);
      --border-default: #2A2E27;
      --border-light: #323830;
      --border-focus: rgba(212, 130, 26, 0.40);
      --text-primary: #E8E4DC;
      --text-secondary: #8A857A;
      --text-muted: #4E4B46;
      --accent-default: #D4821A;
      --accent-text: #E8A030;
      --accent-border: rgba(212, 130, 26, 0.40);
      --status-playing: #6FA85C;
      --font-mono: 'JetBrains Mono', monospace;
      --interactive-tag-bg: rgba(255, 255, 255, 0.04);
      --shadow-launcher: 0 0 0 0.5px rgba(255,255,255,0.04) inset;
      --shadow-input-focus: 0 0 0 1px rgba(212,130,26,0.40), inset 0 1px 8px rgba(212,130,26,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #10120E;
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text-primary);
    }
    .launcher {
      width: 560px;
      background: var(--surface-card);
      border-radius: 12px;
      border: 1px solid var(--border-default);
      box-shadow: var(--shadow-launcher);
      overflow: hidden;
    }
    .header { padding: 12px 12px 10px; }
    .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .wordmark { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; }
    .wordmark-icon { width: 22px; height: 22px; color: var(--accent-default); flex-shrink: 0; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .live-badge { display: flex; align-items: center; gap: 4px; font-size: 10px; letter-spacing: 0.06em; color: var(--text-secondary); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--status-playing); flex-shrink: 0; }
    .version-label { font-size: 9px; letter-spacing: 0.04em; color: var(--text-muted); }
    .vertical-divider { width: 1px; height: 12px; background: var(--border-light); flex-shrink: 0; }
    .theme-toggle { display: flex; align-items: center; gap: 4px; background: none; border: none; padding: 2px 4px; border-radius: 4px; color: var(--text-secondary); cursor: pointer; }
    .theme-toggle .kbd-hint-small { font-size: 9px; letter-spacing: 0.04em; color: var(--text-muted); }
    .close-btn { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: none; border: none; border-radius: 4px; color: var(--text-muted); font-size: 11px; cursor: pointer; padding: 0; }
    .search-wrap { position: relative; }
    .search-frame {
      position: relative;
      height: 40px;
      background: var(--surface-input);
      border-radius: 6px;
      border: 1px solid var(--border-default);
      display: flex;
      align-items: center;
    }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; flex-shrink: 0; }
    .search-frame .search-input {
      flex: 1;
      margin-left: 38px;
      margin-right: 50px;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .search-frame .search-input::placeholder { color: var(--text-muted); }
    .search-kbd {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 5px;
      border-radius: 3px;
      pointer-events: none;
    }
    .gradient-divider { height: 1px; background: var(--border-default); margin: 2px 0; }
    .column-headers {
      display: flex;
      justify-content: space-between;
      padding: 5px 12px 5px 44px;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .results-list { padding: 0; }
    .sound-row {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 12px;
      position: relative;
      border: 1px solid transparent;
    }
    .sound-row.is-selected { background: var(--surface-row-selected); border-color: var(--accent-border); }
    .selected-bar {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 55%;
      background: var(--accent-default);
      border-radius: 0 1px 1px 0;
    }
    .play-indicator { width: 20px; height: 20px; margin-right: 8px; display: flex; align-items: center; justify-content: center; }
    .pi-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); }
    .sound-name { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sound-meta { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-secondary); }
    .tag-badge { font-size: 9px; letter-spacing: 0.08em; background: var(--interactive-tag-bg); border: 1px solid var(--border-light); border-radius: 2px; padding: 1px 4px; text-transform: uppercase; color: var(--text-muted); }
    .sound-row-edit-btn { position: absolute; right: 10px; width: 20px; height: 20px; background: none; border: none; color: var(--accent-default); cursor: pointer; }
    .sound-row-editor {
      background: var(--surface-input);
      border: 1px solid var(--border-focus);
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 10px 12px 12px 44px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .editor-field-row { display: flex; align-items: center; gap: 8px; }
    .editor-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); width: 52px; }
    .editor-input {
      flex: 1;
      height: 26px;
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      padding: 0 8px;
    }
    .editor-input:focus { outline: none; border-color: var(--accent-border); box-shadow: var(--shadow-input-focus); }
    .editor-tag-field {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      min-height: 26px;
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      padding: 2px 6px;
    }
    .editor-tag-chip { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; background: var(--interactive-tag-bg); border: 1px solid var(--border-light); border-radius: 2px; padding: 1px 5px; display: inline-flex; align-items: center; gap: 4px; }
    .editor-tag-chip-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; }
    .editor-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 2px; }
    .editor-btn-save { height: 22px; padding: 0 10px; font-family: var(--font-mono); font-size: 9px; font-weight: 700; background: var(--accent-default); color: #10120E; border: none; border-radius: 3px; cursor: pointer; }
    .editor-btn-cancel { height: 22px; padding: 0 10px; font-size: 9px; background: transparent; color: var(--text-muted); border: 1px solid var(--border-light); border-radius: 3px; cursor: pointer; }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 32px;
      background: var(--surface-footer);
      border-top: 1px solid var(--border-default);
    }
    .footer-hints { display: flex; gap: 12px; font-size: 9px; color: var(--text-muted); }
    .footer-right { display: flex; align-items: center; gap: 6px; }
    .footer-edit-btn, .footer-import-btn {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      height: 24px;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--accent-border);
      background: transparent;
      color: var(--accent-text);
      cursor: pointer;
    }
    .footer-import-btn { border-color: var(--border-light); color: var(--text-muted); }
    .sndbts-toast {
      position: fixed;
      bottom: 48px;
      right: 12px;
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 10px;
      color: var(--text-secondary);
      box-shadow: var(--shadow-input-focus);
    }
  </style>
</head>
<body>
  <div class="launcher is-editing">
    <div class="header">
      <div class="top-row">
        <div class="wordmark">
          <div class="wordmark-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="22" height="22" rx="4" fill="currentColor" fill-opacity="0.08"/>
              <path d="M6 8.5H8.5L12 6V16L8.5 13.5H6V8.5Z" fill="currentColor" fill-opacity="0.9"/>
              <path d="M14 8.5C14.8 9.3 15.3 10.1 15.3 11C15.3 11.9 14.8 12.7 14 13.5" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.2" stroke-linecap="round"/>
              <path d="M15.5 7C16.8 8.2 17.5 9.6 17.5 11C17.5 12.4 16.8 13.8 15.5 15" stroke="currentColor" stroke-opacity="0.4" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="wordmark-label">SNDBTS</span>
        </div>
        <div class="header-right">
          <div class="live-badge">
            <span class="live-dot" aria-hidden="true"></span>
            <span class="live-count">14</span>
            <span class="live-label">LIVE</span>
          </div>
          <span class="version-label">v0.1</span>
          <div class="vertical-divider" aria-hidden="true"></div>
          <button type="button" class="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="6.5" cy="6.5" r="2.5" fill="currentColor"/>
              <line x1="6.5" y1="0.5" x2="6.5" y2="2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="6.5" y1="11" x2="6.5" y2="12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="0.5" y1="6.5" x2="2" y2="6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="11" y1="6.5" x2="12.5" y2="6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="2.4" y1="2.4" x2="3.4" y2="3.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="9.6" y1="9.6" x2="10.6" y2="10.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="10.6" y1="2.4" x2="9.6" y2="3.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="3.4" y1="9.6" x2="2.4" y2="10.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span class="kbd-hint-small">⌘/</span>
          </button>
          <div class="vertical-divider" aria-hidden="true"></div>
          <button type="button" class="close-btn" aria-label="Close">&#x2715;</button>
        </div>
      </div>
      <div class="search-wrap">
        <div class="search-frame">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
            <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <input type="text" class="search-input" placeholder="Search sounds…" value="bacon" readonly tabindex="-1" />
          <span class="search-kbd" aria-hidden="true">⌘K</span>
        </div>
      </div>
    </div>
    <div class="gradient-divider"></div>
    <div class="column-headers">
      <span>NAME</span>
      <span>CAT · TAG · DUR</span>
    </div>
    <div class="results-list">
      <div class="sound-row">
        <div class="selected-bar"></div>
        <div class="play-indicator"><span class="pi-dot"></span></div>
        <span class="sound-name">vinyl.crackle-warm</span>
        <div class="sound-meta">
          <span>texture</span>
          <span class="tag-badge">LOOP</span>
          <span>∞</span>
        </div>
        <button type="button" class="sound-row-edit-btn" aria-label="Edit">✎</button>
      </div>
      <div class="sound-row-editor is-open">
        <div class="editor-field-row">
          <span class="editor-label">Name</span>
          <input type="text" class="editor-input" value="vinyl.crackle-warm" />
        </div>
        <div class="editor-field-row">
          <span class="editor-label">Category</span>
          <input type="text" class="editor-input" value="texture" />
        </div>
        <div class="editor-field-row">
          <span class="editor-label">Tags</span>
          <div class="editor-tag-field">
            <span class="editor-tag-chip">LOOP <button type="button" class="editor-tag-chip-remove" aria-label="Remove">×</button></span>
            <span class="editor-tag-chip">TEXTURE <button type="button" class="editor-tag-chip-remove" aria-label="Remove">×</button></span>
          </div>
        </div>
        <div class="editor-actions">
          <button type="button" class="editor-btn-cancel">Cancel</button>
          <button type="button" class="editor-btn-save">Save</button>
        </div>
      </div>
      <div class="sound-row">
        <div class="play-indicator"><span class="pi-dot"></span></div>
        <span class="sound-name">tape.hiss-saturate</span>
        <div class="sound-meta"><span>texture</span><span class="tag-badge">NOISE</span><span>∞</span></div>
        <button type="button" class="sound-row-edit-btn">✎</button>
      </div>
      <div class="sound-row">
        <div class="play-indicator"><span class="pi-dot"></span></div>
        <span class="sound-name">forest.stream-soft</span>
        <div class="sound-meta"><span>nature</span><span class="tag-badge">AMBIENT</span><span>∞</span></div>
        <button type="button" class="sound-row-edit-btn">✎</button>
      </div>
    </div>
    <div class="footer">
      <div class="footer-hints">
        <span>↵ play/stop</span>
        <span>↑↓ navigate</span>
        <span>⌘P pin</span>
        <span>⌘/ theme</span>
      </div>
      <div class="footer-right">
        <button type="button" class="footer-import-btn">+ Import</button>
        <button type="button" class="footer-edit-btn is-active">⌘E Done Editing</button>
      </div>
    </div>
  </div>
  <div class="sndbts-toast is-visible">Saved</div>
</body>
</html>
